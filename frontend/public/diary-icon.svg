<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    /* 浅色模式 - 深色日记本 */
    @media (prefers-color-scheme: light) {
      .cover { fill: #2a2520; stroke: #1a1510; }
      .text { fill: #1a1510; }
      .decoration { stroke: #8a733e; }
      .border { stroke: #1a1510; }
    }
    
    /* 深色模式 - 浅色日记本 */
    @media (prefers-color-scheme: dark) {
      .cover { fill: #d4c5a9; stroke: #8a733e; }
      .text { fill: #3a3020; }
      .decoration { stroke: #6a5a3e; }
      .border { stroke: #5a4a30; }
    }
  </style>
  
  <!-- 日记本封面 -->
  <rect class="cover" x="6" y="4" width="20" height="24" rx="1" stroke-width="0.5"/>
  
  <!-- 书脊装饰线 -->
  <line class="decoration" x1="8" y1="4" x2="8" y2="28" stroke-width="0.3" opacity="0.6"/>
  <line class="decoration" x1="9" y1="4" x2="9" y2="28" stroke-width="0.2" opacity="0.4"/>
  
  <!-- 封面边框 -->
  <rect class="border" x="9" y="7" width="15" height="18" rx="0.5" fill="none" stroke-width="0.4" opacity="0.5"/>
  
  <!-- T.M.R 文字 -->
  <text class="text" x="16" y="17" font-family="serif" font-size="5" text-anchor="middle" opacity="0.4" font-weight="bold">T.M.R</text>
  
  <!-- 魔法符号 -->
  <circle class="decoration" cx="16" cy="22" r="1.5" fill="none" stroke-width="0.3" opacity="0.3"/>
  <path class="decoration" d="M 16 20.5 L 16 23.5 M 14.5 22 L 17.5 22" stroke-width="0.3" opacity="0.3"/>
  
  <!-- 金属角装饰 -->
  <path class="decoration" d="M 24 6 L 26 6 L 26 8" fill="none" stroke-width="0.4" opacity="0.5"/>
  <path class="decoration" d="M 24 26 L 26 26 L 26 24" fill="none" stroke-width="0.4" opacity="0.5"/>
</svg>
